<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../CSS/carrito.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="icon" type="image/png" href="../../logo de san bartolo 2.png">
    <title>Polleria San Bartolo</title>
</head>
<body>
    <header>
        <div class="logo">
            <a href="../../index.html">
                <img src="logotrasnparente.png" alt="Logo San Bartolo">
            </a>
        </div>

        <nav class="subpaginas">
            <a href="../../index.html">INICIO</a> 
            <a href="../OrdeneAqui/OrdeneAqui.html">ORDENA AQUÍ</a> 
            <a href="../Locales/Locales.html">LOCALES</a> 
            <a href="../MisPedidos/MisPedidos.html">MIS PEDIDOS</a> 
            <a href="../Reservas/Reservas.html">RESERVAS</a> 

            <a href="../CarritoCompras/CarritoCompras.html">
                <img src="carrito.png" alt="Carrito" width="25">
            </a> 

            <a href="../MiCuenta/MiCuenta.html">
                <img src="persona.png" alt="persona" width="25">
            </a> 
        </nav>
    </header>

    <div class="banner">
        <img src="carritocompras.png" alt="banner">
    </div>

    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <symbol id="check-circle-fill" fill="currentColor" viewBox="0 0 16 16">
            <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
        </symbol>
    </svg>

    <div class="alert alert-success d-flex align-items-center" role="alert">
        <svg class="bi flex-shrink-0 me-2" width="24" height="24" role="img">
            <use xlink:href="#check-circle-fill"/>
        </svg>
        <div>
            ✅ ¡Pedido confirmado! Revisa tu carrito y finaliza tu compra.
        </div>
    </div>

    <main>
        <div class="contenedor">

            <div class="izquierda">
                <table class="tabla">
                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Precio</th>
                    </tr>
                    <tr>
                        <td>1/4 Pollo + Papas</td>
                        <td><input type="number"></td>
                        <td>S/ 22.90</td>
                    </tr>
                </table>

                <form action="../MisPedidos/MisPedidos.html" class="metodo-pago">
                    <p>Método de pago:</p>
                    <select>
                        <option>Efectivo</option>
                        <option>Yape/Plin</option>
                        <option>Tarjeta</option>
                    </select>
                </form>
            </div>

            <div class="resumen">
                <h3>Detalle de tu compra</h3>
                <hr>
                <div class="resumen-fila">
                    <span>1/4 Pollo + Papas</span>
                    <span>S/ 22.90</span>
                </div>
                <hr>
                <div class="resumen-fila total">
                    <span>Total</span>
                    <span>S/ 22.90</span>
                </div>
                <hr>
                <form action="../MisPedidos/MisPedidos.html">
                    <input type="submit" value="FINALIZAR COMPRA" class="enviar">
                </form>
            </div>

        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
